[attendance]

select_by_employee_and_date = """
    SELECT * FROM attendance WHERE employee_id=$1 AND date=$2
"""

insert = """
    INSERT INTO attendance (employee_id, employee_name, date, login_time, login_photo)
    VALUES ($1, $2, $3, $4, $5)
    RETURNING *
"""

update_logout = """
    UPDATE attendance
       SET logout_time=$1, logout_photo=$2
     WHERE id=$3
    RETURNING *
"""

select_by_date = """
    SELECT * FROM attendance WHERE date=$1 ORDER BY id DESC
"""

select_all = """
    SELECT * FROM attendance ORDER BY date DESC, id DESC
"""

select_by_id = """
    SELECT * FROM attendance WHERE id=$1
"""

select_by_date_range = """
    SELECT * FROM attendance
    WHERE date >= $1 AND date <= $2
    ORDER BY employee_name, date
"""

select_by_date_ordered_by_name = """
    SELECT * FROM attendance WHERE date=$1 ORDER BY employee_name
"""

delete = """
    DELETE FROM attendance WHERE id=$1
"""